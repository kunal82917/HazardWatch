<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HazardWatch - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-left">
            <div class="hero-content">
                <div class="logo">
                    <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
                        <path d="M30 5L50 20L45 45L30 55L15 45L10 20L30 5Z" stroke="currentColor" stroke-width="3"
                            fill="none" />
                        <circle cx="30" cy="30" r="8" fill="currentColor" />
                        <path d="M30 22V15M30 45V38M38 30H45M15 30H22" stroke="currentColor" stroke-width="2.5" />
                    </svg>
                    <h1>HazardWatch</h1>
                </div>
                <p class="tagline">Real-time disaster monitoring and response coordination</p>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number">24/7</div>
                        <div class="stat-label">Monitoring</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">98%</div>
                        <div class="stat-label">Response Rate</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">1000+</div>
                        <div class="stat-label">Lives Saved</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-wrapper">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access the dashboard</p>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password">
                    </div>

                    <button type="submit" class="btn-primary">
                        Sign In
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>

                    <div class="form-toggle">
                        <span id="modePrompt">Don't have an account?</span>
                        <a href="#" id="toggleMode">Sign up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Optional: set your backend API base URL for production.
        // If left unset, the app will default to locating the API at the current origin.
        // Example: window.API_BASE = 'https://your-backend.example.com';
        // window.API_BASE = 'https://<YOUR_DEPLOYED_BACKEND_URL>';
    </script>
    <script type="module" src="login.js"></script>
</body>

</html>
